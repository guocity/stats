name: build

on:
  push:
    branches:
      - master
      - guocity-version-stats
  pull_request:
    branches:
      - master
      - guocity-version-stats

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned release archive
        run: |
          xcodebuild \
            -scheme Stats \
            -destination 'platform=macOS' \
            -configuration Release \
            archive \
            -archivePath build/Stats.xcarchive \
            CODE_SIGNING_ALLOWED=NO
